<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${car.name}">Chi tiết xe</title>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Montserrat:wght@100;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link th:href="@{/lib/animate/animate.min.css}" rel="stylesheet">
    <link th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">

    <!-- Customized Bootstrap -->
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        .thumbnail-img {
            width: 100px;
            height: 70px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .thumbnail-img:hover {
            transform: scale(1.1);
            border: 2px solid #007bff;
        }
        .booking-form {
            background: #6c757d;
            padding: 25px;
            border-radius: 8px;
            color: white;
        }
        .booking-form h4 {
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group span {
            white-space: nowrap;
        }
    </style>
</head>
<body>
<nav th:replace="fragments/nav :: nav"></nav>

<div class="container py-5">
    <div class="row g-5">

        <!-- Cột 1: Ảnh xe -->
        <div class="col-lg-4">
            <div class="border rounded">
                <img id="mainImage" th:src="${car.imageUrl}" class="img-fluid rounded" alt="Car Image">
            </div>
            <div class="mt-3 d-flex flex-wrap gap-2"
                 th:if="${car.images != null and !car.images.isEmpty()}">
                <img th:each="img : ${car.images}"
                     th:src="${img.imageUrl}"
                     class="img-thumbnail thumbnail-img"
                     alt="Extra image"
                     onclick="changeMainImage(this)">
            </div>
        </div>

        <!-- Cột 2: Thông tin xe -->
        <div class="col-lg-4">
            <h2 class="mb-3" th:text="${car.name}">Tên xe</h2>

            <!-- Giá thay đổi -->
            <div th:if="${car.rentalRates != null and !car.rentalRates.isEmpty()}">
                <h4 class="text-primary mb-2">
                    <span id="rentalPrice"
                          th:text="${#numbers.formatDecimal(car.rentalRates[0].price, 0, 'COMMA', 0, 'POINT')}"></span> VND
                </h4>

                <div class="mb-4">
                    <select class="form-select w-75" id="rentalType" onchange="updatePrice()">
                        <option th:each="rate : ${car.rentalRates}"
                                th:value="${rate.rateType}"
                                th:data-price="${rate.price}"
                                th:text="${rate.rateType}">
                        </option>
                    </select>
                </div>
            </div>

            <p th:text="${car.description}"></p>

            <ul class="list-unstyled mb-4">
                <li><strong>Biển số:</strong> <span th:text="${car.licensePlate}"></span></li>
                <li><strong>Số ghế:</strong> <span th:text="${car.seatNumber}"></span></li>
                <li><strong>Loại xe:</strong> <span th:text="${car.carType.name}"></span></li>
                <li><strong>Hãng xe:</strong> <span th:text="${car.brand.name}"></span></li>
                <li><strong>Tài xế:</strong> <span th:text="${car.hasDriver ? 'Có tài xế' : 'Tự lái'}"></span></li>
                <li><strong>Trạng thái:</strong> <span th:text="${car.status}"></span></li>
            </ul>
        </div>

        <!-- Cột 3: Form đặt xe -->
        <div class="col-lg-4">
            <div class="booking-form">
                <h4>ĐẶT XE NGAY</h4>
                <form th:action="@{/booking}" method="post">
                    <div class="row g-3">
                        <!-- Chọn loại xe -->
                        <div class="col-12">
                            <select class="form-select" name="carId" required>
                                <option th:value="${car.id}" th:text="${car.name}" selected></option>
                            </select>
                        </div>

                        <!-- Nơi nhận -->
                        <div class="col-12">
                            <div class="input-group">
                                <div class="d-flex align-items-center bg-light text-body rounded-start p-2">
                                    <span class="fas fa-map-marker-alt"></span>
                                    <span class="ms-1">Nơi nhận</span>
                                </div>
                                <input class="form-control" type="text" name="pickupLocation" placeholder="Nhập thành phố hoặc sân bay" required>
                            </div>
                        </div>

                        <!-- Nơi trả -->
                        <div class="col-12">
                            <div class="input-group">
                                <div class="d-flex align-items-center bg-light text-body rounded-start p-2">
                                    <span class="fas fa-map-marker-alt"></span>
                                    <span class="ms-1">Nơi trả</span>
                                </div>
                                <input class="form-control" type="text" name="dropoffLocation" placeholder="Nhập thành phố hoặc sân bay" required>
                            </div>
                        </div>

                        <!-- Ngày & giờ nhận -->
                        <div class="col-12">
                            <div class="input-group">
                                <div class="d-flex align-items-center bg-light text-body rounded-start p-2">
                                    <span class="fas fa-calendar-alt"></span>
                                    <span class="ms-1">Ngày nhận</span>
                                </div>
                                <input class="form-control" type="date" name="pickupDate" required>
                                <select class="form-select ms-3" name="pickupTime" required>
                                    <option value="">Chọn giờ</option>
                                    <option th:each="h : ${#numbers.sequence(0,23)}"
                                            th:value="${h + ':00'}"
                                            th:text="${h + ':00'}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Ngày & giờ trả -->
                        <div class="col-12">
                            <div class="input-group">
                                <div class="d-flex align-items-center bg-light text-body rounded-start p-2">
                                    <span class="fas fa-calendar-alt"></span>
                                    <span class="ms-1">Ngày trả</span>
                                </div>
                                <input class="form-control" type="date" name="dropoffDate" required>
                                <select class="form-select ms-3" name="dropoffTime" required>
                                    <option value="">Chọn giờ</option>
                                    <option th:each="h : ${#numbers.sequence(0,23)}"
                                            th:value="${h + ':00'}"
                                            th:text="${h + ':00'}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Nút đặt -->
                        <div class="col-12">
                            <button class="btn btn-light w-100 py-2" type="submit">Đặt ngay</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<!-- JS -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/lib/wow/wow.min.js}"></script>
<script th:src="@{/lib/easing/easing.min.js}"></script>
<script th:src="@{/lib/waypoints/waypoints.min.js}"></script>
<script th:src="@{/lib/counterup/counterup.min.js}"></script>
<script th:src="@{/lib/owlcarousel/owl.carousel.min.js}"></script>
<script th:src="@{/js/main.js}"></script>

<script>
    function changeMainImage(imgElement) {
        document.getElementById('mainImage').src = imgElement.src;
    }
    function updatePrice() {
        const select = document.getElementById('rentalType');
        const price = select.options[select.selectedIndex].dataset.price;
        document.getElementById('rentalPrice').innerText = Number(price).toLocaleString();
    }
</script>

</body>
</html>
