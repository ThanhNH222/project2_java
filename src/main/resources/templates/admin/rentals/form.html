<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="${mode == 'create'} ? 'Thêm hợp đồng' : 'Sửa hợp đồng'">Form thuê xe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
          background: #0f172a;
          color: #fff;
          font-family: "Segoe UI", sans-serif;
        }
        .sidebar {
          width: 220px;
          min-height: 100vh;
          background: #1e293b;
          position: fixed;
          left: 0;
          top: 0;
          padding: 20px;
        }
        .sidebar a {
          display: block;
          padding: 12px;
          margin-bottom: 8px;
          text-decoration: none;
          color: #cbd5e1;
          border-radius: 8px;
        }
        .sidebar a:hover,
        .sidebar a.active {
          background: #334155;
          color: #fff;
        }
        .content {
          margin-left: 240px;
          padding: 24px;
        }
        .card-dark {
          background: #1e293b;
          border: none;
          border-radius: 12px;
          box-shadow: 0 6px 18px rgba(0,0,0,0.3);
          color: #fff;
          padding: 24px;
        }
        .btn-soft {
          border-radius: 8px;
        }
        label {
          font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-white mb-4">🚗 Car Rental</h4>
    <a href="/admin">📊 Dashboard</a>
    <a href="/admin/cars">🚘 Quản lý xe</a>
    <a href="/admin/customers">👥 Khách hàng</a>
    <a href="/admin/rentals" class="active">🔑 Thuê xe</a>
</div>

<!-- Content -->
<div class="content">
    <div class="card-dark">
        <h2 th:text="${mode == 'create'} ? '➕ Thêm hợp đồng' : '✏ Sửa hợp đồng'"></h2>

        <form th:action="${mode == 'create'} ? @{/admin/rentals/save} : @{|/admin/rentals/${rental.id}/update|}"
              method="post"
              th:object="${rental}"
              class="mt-3">

            <!-- Xe -->
            <div class="mb-3">
                <label class="form-label">Chọn xe</label>
                <select th:field="*{car}" class="form-select rounded-3" required>
                    <option value="">-- Chọn xe --</option>
                    <option th:each="car : ${cars}" th:value="${car}" th:text="${car.name}"></option>
                </select>
            </div>

            <!-- Khách hàng -->
            <div class="mb-3">
                <label class="form-label">Chọn khách hàng</label>
                <select th:field="*{customer}" class="form-select rounded-3" required>
                    <option value="">-- Chọn khách hàng --</option>
                    <option th:each="customer : ${customers}" th:value="${customer}" th:text="${customer.name}"></option>
                </select>
            </div>


            <!-- Ngày bắt đầu -->
            <div class="mb-3">
                <label class="form-label">Ngày bắt đầu</label>
                <input type="datetime-local" th:field="*{pickupDateTime}" class="form-control rounded-3" required>
            </div>

            <!-- Ngày kết thúc -->
            <div class="mb-3">
                <label class="form-label">Ngày kết thúc</label>
                <input type="datetime-local" th:field="*{dropoffDateTime}" class="form-control rounded-3" required>
            </div>

            <!-- Trạng thái -->
            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select th:field="*{status}" class="form-select rounded-3">
                    <option value="Đang thuê">Đang thuê</option>
                    <option value="Hoàn thành">Hoàn thành</option>
                    <option value="Hủy">Hủy</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success btn-soft">💾 Lưu lại</button>
                <a href="/admin/rentals" class="btn btn-secondary btn-soft">⬅ Quay lại</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
