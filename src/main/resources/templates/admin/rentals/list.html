<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý thuê xe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
  <h2 class="mb-3">Quản lý thuê xe</h2>
  <div class="mb-3">
    <a href="/admin/rentals/add" class="btn btn-danger">
      ➕ Thêm hợp đồng
    </a>
    <a href="/admin/dashboard" class="btn btn-dark">
      ⬅ Quay lại Dashboard
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="card-title">Danh sách thuê xe</h5>
      <table class="table table-bordered table-hover mt-3">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Xe</th>
          <th>Khách hàng</th>
          <th>Ngày bắt đầu</th>
          <th>Ngày kết thúc</th>
          <th>Trạng thái</th>
          <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <!-- Thymeleaf loop -->
        <tr th:each="rental : ${rentals}">
          <td th:text="${rental.id}"></td>
          <td th:text="${rental.carId}"></td>
          <td th:text="${rental.customerId}"></td>
          <td th:text="${#temporals.format(rental.startDate, 'dd/MM/yyyy HH:mm')}"></td>
          <td th:text="${#temporals.format(rental.endDate, 'dd/MM/yyyy HH:mm')}"></td>
          <td th:text="${rental.status}"></td>
          <td>
            <a href="#" class="btn btn-sm btn-warning">Sửa</a>
            <a href="#" class="btn btn-sm btn-danger">Xóa</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
