<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #0f172a; /* dark mode */
            color: #fff;
            font-family: "Segoe UI", sans-serif;
        }
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background: #1e293b;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }
        .sidebar a {
            display: block;
            padding: 12px;
            margin-bottom: 8px;
            text-decoration: none;
            color: #cbd5e1;
            border-radius: 8px;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background: #334155;
            color: #fff;
        }
        .content {
            margin-left: 240px;
            padding: 24px;
        }
        .card-dark {
            background: #1e293b;
            border: none;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            color: #fff;
            padding: 24px;
        }
        .table-dark th {
            background: #334155 !important;
            color: #fff;
        }
        .btn-soft {
            border-radius: 8px;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-white mb-4">🚗 Car Rental</h4>
    <a href="/admin">📊 Dashboard</a>
    <a href="/admin/cars">🚘 Quản lý xe</a>
    <a href="/admin/customers" class="active">👥 Khách hàng</a>
    <a href="/admin/rentals">🔑 Thuê xe</a>
</div>

<!-- Content -->
<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="m-0">👥 Quản lý khách hàng</h2>
        <a href="/admin/customers/create" class="btn btn-success btn-soft">➕ Thêm khách hàng</a>
    </div>

    <!-- Thông báo -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card-dark">
        <h5 class="card-title">Danh sách khách hàng</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle mt-3 text-white">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Địa chỉ</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.id}"></td>
                    <td th:text="${customer.name}"></td>
                    <td th:text="${customer.email}"></td>
                    <td th:text="${customer.phone}"></td>
                    <td th:text="${customer.address}"></td>
                    <td class="text-center">
                        <a th:href="@{|/admin/customers/${customer.id}/edit|}" class="btn btn-sm btn-warning btn-soft">✏ Sửa</a>
                        <form th:action="@{|/admin/customers/${customer.id}/delete|}" method="post"
                              style="display:inline-block"
                              onsubmit="return confirm('Bạn có chắc muốn xóa khách hàng này không?');">
                            <button type="submit" class="btn btn-sm btn-danger btn-soft">🗑 Xóa</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${customers.size() == 0}">
                    <td colspan="6" class="text-center text-muted">Không có khách hàng nào</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
