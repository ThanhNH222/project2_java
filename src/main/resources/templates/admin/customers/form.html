<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title th:text="${mode == 'create'} ? 'Thêm khách hàng' : 'Sửa khách hàng'">Form khách hàng</title>
  <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-4">
  <h2 th:text="${mode == 'create'} ? '➕ Thêm khách hàng' : '✏ Sửa khách hàng'"></h2>

  <form th:action="${mode == 'create'} ? @{/admin/customers/save} : @{|/admin/customers/${customer.id}/update|}"
        method="post"
        th:object="${customer}"
        class="mt-3">

    <div class="mb-3">
      <label for="name" class="form-label">Tên khách hàng</label>
      <input type="text" id="name" th:field="*{name}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" id="email" th:field="*{email}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="phone" class="form-label">Số điện thoại</label>
      <input type="text" id="phone" th:field="*{phone}" class="form-control">
    </div>

    <div class="mb-3">
      <label for="address" class="form-label">Địa chỉ</label>
      <input type="text" id="address" th:field="*{address}" class="form-control">
    </div>

    <button type="submit" class="btn btn-success">💾 Lưu lại</button>
    <a href="/admin/customers" class="btn btn-secondary">⬅ Quay lại</a>
  </form>
</div>

</body>
</html>
